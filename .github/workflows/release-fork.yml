name: release-fork
permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for this release"
        required: true
        default: "v0.0.0"

concurrency:
  group: release-fork-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build unsigned APKs
        run: ./gradlew :app:assembleStandaloneDebug :app:assembleFdroidDebug --stacktrace

      - name: Collect APKs
        id: collect
        run: |
          mkdir -p dist
          find app/build/outputs/apk -type f -name "*.apk" -exec cp {} dist/ \;
          ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: dist/*.apk
          retention-days: 14
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || inputs.tag_name }}
          name: ${{ github.event_name == 'push' && github.ref_name || inputs.tag_name }}
          draft: false
          prerelease: false
          make_latest: true
          files: dist/*.apk
